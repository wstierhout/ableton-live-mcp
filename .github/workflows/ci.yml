name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Lint
        run: uvx ruff check .
      - name: Format check (server + tests)
        run: uvx ruff format --check MCP_Server tests
      - name: Byte-compile remote script
        run: python3 -m py_compile AbletonMCP_Remote_Script/__init__.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Tests
        run: uv run --extra dev pytest -q
